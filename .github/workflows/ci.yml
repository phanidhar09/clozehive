name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  #  API Gateway — lint + test
  # ─────────────────────────────────────────────────────────────────────────────
  api-gateway:
    name: API Gateway (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clozehive
          POSTGRES_PASSWORD: clozehive
          POSTGRES_DB: clozehive_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: services/api-gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api-gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports || true

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key
          OPENAI_API_KEY: sk-test
          AI_AGENT_URL: http://localhost:8001
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────────
  #  AI Agent — lint
  # ─────────────────────────────────────────────────────────────────────────────
  ai-agent:
    name: AI Agent (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/ai-agent

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/ai-agent/requirements.txt

      - name: Install
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check app/

  # ─────────────────────────────────────────────────────────────────────────────
  #  Frontend — build check
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─────────────────────────────────────────────────────────────────────────────
  #  Docker — build all images
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api-gateway, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: false
          tags: clozehive/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI Agent
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-agent
          push: false
          tags: clozehive/ai-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
