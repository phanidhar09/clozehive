# ─────────────────────────────────────────────────────────────────────────────
#  CLOZEHIVE — Local Development Docker Compose
#  Start: docker compose up --build
#  Stop:  docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

# ── Shared env for Python services ───────────────────────────────────────────
x-python-env: &python-env
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-false}

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: clozehive
      POSTGRES_PASSWORD: clozehive
      POSTGRES_DB: clozehive
    ports:
      # Host 5433 → container 5432 so we don't clash with a local Postgres install.
      # Override by setting POSTGRES_HOST_PORT in .env if you want a different mapping.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clozehive -d clozehive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MCP Microservices ───────────────────────────────────────────────────────

  mcp-weather:
    build:
      context: ./services/mcp
      dockerfile: weather/Dockerfile
    <<: [*restart, *logging]
    environment:
      <<: *python-env
      WEATHER_PORT: "8010"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8010)); s.close()\""]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 3

  mcp-vision:
    build:
      context: ./services/mcp
      dockerfile: vision/Dockerfile
    <<: [*restart, *logging]
    environment:
      <<: *python-env
      VISION_PORT: "8011"
    ports:
      - "8011:8011"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8011)); s.close()\""]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 3

  mcp-outfit:
    build:
      context: ./services/mcp
      dockerfile: outfit/Dockerfile
    <<: [*restart, *logging]
    environment:
      <<: *python-env
      OUTFIT_PORT: "8012"
    ports:
      - "8012:8012"

  mcp-packing:
    build:
      context: ./services/mcp
      dockerfile: packing/Dockerfile
    <<: [*restart, *logging]
    environment:
      <<: *python-env
      PACKING_PORT: "8013"
    ports:
      - "8013:8013"

  # ── AI Agent ────────────────────────────────────────────────────────────────

  ai-agent:
    build:
      context: ./services/ai-agent
      dockerfile: Dockerfile
    <<: [*restart, *logging]
    environment:
      <<: *python-env
      PORT: "8001"
      REDIS_URL: redis://redis:6379/1
      DATABASE_URL: postgresql://clozehive:clozehive@postgres:5432/clozehive
      VECTOR_STORE: pgvector
      MCP_WEATHER_URL: http://mcp-weather:8010/sse
      MCP_VISION_URL: http://mcp-vision:8011/sse
      MCP_OUTFIT_URL: http://mcp-outfit:8012/sse
      MCP_PACKING_URL: http://mcp-packing:8013/sse
      OPENAI_MODEL: gpt-4o
    ports:
      - "8001:8001"
    depends_on:
      mcp-weather:
        condition: service_healthy
      mcp-vision:
        condition: service_started
      mcp-outfit:
        condition: service_started
      mcp-packing:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 3

  # ── API Gateway ─────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    <<: [*restart, *logging]
    environment:
      <<: *python-env
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://clozehive:clozehive@postgres:5432/clozehive
      REDIS_URL: redis://redis:6379/0
      AI_AGENT_URL: http://ai-agent:8001
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production_please}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-agent:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    volumes:
      - uploads:/app/uploads

  # ── DB Migrations ────────────────────────────────────────────────────────────

  migrate:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://clozehive:clozehive@postgres:5432/clozehive
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    <<: [*restart, *logging]
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:3000"
    depends_on:
      - api-gateway

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    <<: [*restart, *logging]
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend

volumes:
  postgres_data:
  redis_data:
  uploads:
